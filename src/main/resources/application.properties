spring.application.name=urlshortener

# Conexão com banco — usa variável de ambiente ou valor padrão após :
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/urlshortener}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# URL base pública da aplicação
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Hibernate — cria/atualiza as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

# Formata o SQL para ficar legível no terminal
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# JWT secret
jwt.secret=${JWT_SECRET}

# Swagger UI em uma URL mais amigável
springdoc.swagger-ui.path=/docs

# SpringDoc/OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

server.forward-headers-strategy=framework

